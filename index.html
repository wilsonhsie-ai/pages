<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wilson Hsie — Pages</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0078d4 0%, #005a9e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 48px 56px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.2);
      max-width: 520px;
    }
    h1 { font-size: 2rem; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 1.1rem; opacity: 0.85; margin-bottom: 24px; }
    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .status { margin-top: 24px; font-size: 0.9rem; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚀 Wilson Hsie — Pages</h1>
    <p>GitHub Pages configurado com sucesso!</p>
    <span class="badge">Microsoft Brasil — Digital Specialist</span>
    <div class="status">✅ Site ativo — pronto para receber conteúdo</div>
  </div>
</body>
</html>
